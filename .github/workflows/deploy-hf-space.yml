name: Sync to HuggingFace Space

on:
  push:
    branches: [main]
    paths:
      - 'app.py'
      - 'requirements.txt'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  sync:
    name: Sync to HF Space
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://evez420:$HF_TOKEN@huggingface.co/spaces/evez420/evezart-openclaw
          git push hf main --force
