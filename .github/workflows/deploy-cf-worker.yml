name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker.js'
      - 'wrangler.toml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy CF Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: deploy
          
      - name: Verify deployment
        run: |
          sleep 5
          curl -f https://evez-openclaw.evezvearl.workers.dev/health || \
          curl -f https://evez-openclaw.evez666.workers.dev/health || \
          echo "Worker deployed — check CF dashboard for URL"
