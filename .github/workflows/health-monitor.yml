name: OpenClaw Health Monitor

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:

jobs:
  check:
    name: Check all OpenClaw endpoints
    runs-on: ubuntu-latest
    steps:
      - name: Check all layers
        id: health
        run: |
          ENDPOINTS=(
            "https://evez420-evezart-openclaw.hf.space/health:HF_Space"
            "https://evezart-openclaw.fly.dev/health:Fly.io"
            "https://evez-openclaw.evezvearl.workers.dev/health:CF_Worker"
          )
          
          REPORT="⚡ OpenClaw Health\n"
          ALL_OK=true
          
          for entry in "${ENDPOINTS[@]}"; do
            URL="${entry%%:*}"
            NAME="${entry##*:}"
            STATUS=$(curl -sf --max-time 5 "$URL" 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','?'))" 2>/dev/null || echo "DOWN")
            if [[ "$STATUS" == "EVEZ_ONLINE" ]]; then
              REPORT+="✅ $NAME: ONLINE\n"
            else
              REPORT+="❌ $NAME: $STATUS\n"
              ALL_OK=false
            fi
          done
          
          echo "REPORT=$REPORT" >> $GITHUB_OUTPUT
          echo "ALL_OK=$ALL_OK" >> $GITHUB_OUTPUT
          
          if [[ "$ALL_OK" == "true" ]]; then
            echo "All endpoints healthy"
          else
            echo "Some endpoints down!"
          fi
          
      - name: Notify Telegram if degraded
        if: steps.health.outputs.ALL_OK == 'false'
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${{ secrets.TELEGRAM_CHAT_ID }}\",
              \"text\": \"⚠️ OpenClaw degraded\\n${{ steps.health.outputs.REPORT }}\",
              \"parse_mode\": \"HTML\"
            }"
