name: Build OpenClaw → GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.build
          push: true
          tags: |
            ghcr.io/evezart/evezart-openclaw:latest
            ghcr.io/evezart/evezart-openclaw:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger HF Space rebuild
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Triggering HF Space rebuild..."
          curl -s -X POST \
            "https://huggingface.co/api/spaces/evez420/evezart-openclaw/restart" \
            -H "Authorization: Bearer $HF_TOKEN" && echo " ✅ HF restart triggered"
