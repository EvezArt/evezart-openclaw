name: Deploy to Fly.io

on:
  push:
    branches: [main]
    paths:
      - 'evez_gateway.py'
      - 'Dockerfile'
      - 'fly.toml'
      - 'requirements.txt'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    concurrency: deploy-fly
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
      
      - name: Deploy to Fly.io
        run: |
          flyctl deploy --remote-only --wait-timeout 120
          echo "Deployed to: https://evezart-openclaw.fly.dev"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      
      - name: Health check
        run: |
          sleep 10
          curl -f https://evezart-openclaw.fly.dev/health || echo "Health check pending..."
