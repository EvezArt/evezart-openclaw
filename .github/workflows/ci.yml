name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── 1. Test the gateway ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install deps
        run: pip install -r requirements.txt
      
      - name: Validate config
        run: python3 -c "
import json
with open('config/openclaw.json') as f:
    cfg = json.load(f)
providers = cfg.get('providers', [])
enabled = [p['id'] for p in providers if p.get('enabled')]
print(f'✅ Config valid: {len(providers)} providers, {len(enabled)} enabled')
print(f'   Enabled: {enabled}')
models = sum(len(p.get(\"models\",[])) for p in providers if p.get('enabled') and not p.get('local'))
print(f'   Total models: {models}')
"
      
      - name: Smoke test gateway
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GATEWAY_TOKEN: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
        run: |
          python3 evez_gateway.py &
          GATEWAY_PID=$!
          sleep 5
          
          # Health check
          curl -s http://localhost:8080/health | python3 -c "
import json,sys
d=json.load(sys.stdin)
print(f'Health: {d.get(\"status\")} | providers: {d.get(\"providers_ready\")}')
" || echo "Health check failed (expected in CI without full env)"
          
          kill $GATEWAY_PID 2>/dev/null || true

  # ── 2. Update spine with build event ───────────────────────────────
  spine-append:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
      
      - name: Append build event to spine
        run: |
          python3 - << 'PYEOF'
import json, hashlib, datetime, os

spine_file = 'spine/events.jsonl'
os.makedirs('spine', exist_ok=True)

# Read last event for chain
last_hash = "GENESIS"
try:
    with open(spine_file, 'r') as f:
        lines = [l.strip() for l in f if l.strip()]
        if lines:
            last_event = json.loads(lines[-1])
            last_hash = last_event.get('hash', 'GENESIS')
except FileNotFoundError:
    pass

# Build new event
event = {
    "id": f"BUILD-{datetime.datetime.utcnow().strftime('%Y%m%d-%H%M%S')}",
    "type": "BUILD_SUCCESS",
    "timestamp": datetime.datetime.utcnow().isoformat() + "Z",
    "prev_hash": last_hash,
    "payload": {
        "repo": "EvezArt/evezart-openclaw",
        "sha": os.environ.get("GITHUB_SHA", "unknown")[:8],
        "run_id": os.environ.get("GITHUB_RUN_ID", "unknown"),
        "actor": os.environ.get("GITHUB_ACTOR", "evezart")
    }
}

# Compute hash
event_str = json.dumps(event, sort_keys=True)
event["hash"] = hashlib.sha256((last_hash + event_str).encode()).hexdigest()

with open(spine_file, 'a') as f:
    f.write(json.dumps(event) + '\n')

print(f"✅ Spine appended: {event['id']} hash={event['hash'][:16]}...")
PYEOF
      
      - name: Commit spine update
        run: |
          git config user.email "evezart@evezart.github.io"
          git config user.name "EVEZ-OS Spine"
          git add spine/
          git diff --cached --quiet || git commit -m "spine: build event $(date -u +%Y%m%dT%H%M%S) [skip ci]"
          git push

  # ── 3. Notify Telegram ────────────────────────────────────────────
  notify:
    runs-on: ubuntu-latest
    needs: [test, spine-append]
    if: github.ref == 'refs/heads/main' && always()
    steps:
      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "No Telegram token, skipping"
            exit 0
          fi
          
          STATUS="${{ needs.test.result }}"
          EMOJI=$([ "$STATUS" = "success" ] && echo "✅" || echo "❌")
          SHA="${{ github.sha }}"
          
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"$TELEGRAM_CHAT_ID\",
              \"text\": \"$EMOJI EvezArt OpenClaw build ${STATUS}\\nSHA: ${SHA:0:8}\\nRun: ${{ github.run_number }}\",
              \"parse_mode\": \"Markdown\"
            }"
