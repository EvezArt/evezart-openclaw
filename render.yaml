services:
  - type: web
    name: evezart-openclaw
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn evez_gateway:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: HUGGING_FACE_ACCESS_TOKEN
        sync: false
      - key: GATEWAY_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GITHUB_TOKEN
        sync: false
    autoDeploy: true
    plan: free
